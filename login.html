<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Gym Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gym.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="logo-title">GYM</h1>
            <p class="subtitle">Guarda tu progreso en la nube</p>

            <!-- Pestañas para cambiar entre Login y Registro -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login">Iniciar Sesión</button>
                <button class="tab-btn" id="tab-register">Registrarse</button>
            </div>

            <!-- Formulario de Autenticación -->
            <form id="authForm">
                <div class="input-group" id="username-group" style="display: none;">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" placeholder="¿Cómo te llamas?" minlength="3">
                </div>
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required minlength="6">
                        <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Mostrar/Ocultar Contraseña">👁️</button>
                    </div>
                </div>
                <div id="error-message" class="error-msg"></div>

                <!-- Botón dinámico -->
                <button type="submit" id="btn-submit" class="primary-btn">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Firebase Compat SDKs (V9/V10 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- Scripts locales -->
    <script src="firebase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script src="login.js"></script>
</body>

</html>
